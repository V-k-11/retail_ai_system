services:
  - type: web
    name: retail-ai-system
    env: python
    buildCommand: pip install -r requirements-api.txt
    startCommand: uvicorn src.serving.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: MODEL_URI
        value: models:/retail_model/latest

